# Publishes to GitHub Packages when a version bump is pushed to main.
# Triggered only when package.json changes on the main branch — the publish
# step then checks whether the version in package.json already exists in the
# registry and skips if so (idempotent, safe to re-run).

name: Node.js Package

on:
  push:
    branches:
      - main
    paths:
      - package.json

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/

      - name: Install root dependencies
        run: npm ci

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Run tests
        run: npm test
        working-directory: tests

      - name: Check if version already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry https://npm.pkg.github.com/ 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
